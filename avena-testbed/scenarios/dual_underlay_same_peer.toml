name = "dual-underlay-same-peer"
description = "Two parallel underlays between same peer pair; verifies dual tunnel activation"
duration_secs = 45

[[nodes]]
id = "nodeA"
capabilities = ["relay"]

[[nodes]]
id = "nodeB"
capabilities = ["relay"]

[[links]]
id = "ab-wifi"
endpoints = ["nodeA", "nodeB"]
latency_ms = 5
bandwidth_kbps = 100000
loss_percent = 0.0
enabled = true

[[links]]
id = "ab-cell"
endpoints = ["nodeA", "nodeB"]
latency_ms = 50
bandwidth_kbps = 10000
loss_percent = 2.0
enabled = true

[[assertions]]
at_secs = 15.0
condition = { type = "NodesConnected", nodes = ["nodeA", "nodeB"] }

[[assertions]]
at_secs = 30.0
condition = { type = "TunnelInterfaceCount", node = "nodeA", count = 2 }

[[assertions]]
at_secs = 30.0
condition = { type = "TunnelInterfaceCount", node = "nodeB", count = 2 }

[[assertions]]
at_secs = 35.0
condition = { type = "Ping", from = "nodeA", to = "nodeB", timeout_ms = 2000 }
