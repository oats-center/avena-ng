name = "two-node-basic-ns3"
description = "Simple two-node connectivity test on the ns3 backend"
duration_secs = 30

[emulation]
backend = "ns3"

[emulation.ns3]
realtime_hard_limit_ms = 250

[emulation.ns3.radio_profiles.default_wifi]
kind = "wifi"
phy_backend = "spectrum"
standard = "802.11n"
band = "5ghz"
channel_width_mhz = 20
tx_power_dbm = 18
rx_noise_figure_db = 7
propagation = "log-distance"

[[nodes]]
id = "nodeA"
capabilities = ["relay"]
position = { x_m = 0.0, y_m = 0.0, z_m = 0.0 }
radio_profile = "default_wifi"

[[nodes.radios]]
id = "wifi0"
channel = 36

[[nodes]]
id = "nodeB"
position = { x_m = 30.0, y_m = 0.0, z_m = 0.0 }
radio_profile = "default_wifi"

[[nodes.radios]]
id = "wifi0"
channel = 36

[[links]]
id = "ab-wifi"
medium = "wifi"
endpoints = ["nodeA:wifi0", "nodeB:wifi0"]
latency_ms = 10
bandwidth_kbps = 100000
loss_percent = 0.0
enabled = true

[[assertions]]
at_secs = 15.0
condition = { type = "NodesConnected", nodes = ["nodeA", "nodeB"] }

[[assertions]]
at_secs = 20.0
condition = { type = "Ping", from = "nodeA", to = "nodeB", timeout_ms = 1000 }
