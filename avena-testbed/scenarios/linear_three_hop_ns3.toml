name = "linear-three-hop-ns3"
description = "Three-node line topology on ns3 backend (A-B-C)"
duration_secs = 45

[emulation]
backend = "ns3"

[emulation.ns3]
realtime_hard_limit_ms = 250

[emulation.ns3.radio_profiles.default_wifi]
kind = "wifi"
phy_backend = "spectrum"
standard = "802.11n"
band = "5ghz"
channel_width_mhz = 20
tx_power_dbm = 18
rx_noise_figure_db = 7
propagation = "log-distance"

[[nodes]]
id = "nodeA"
position = { x_m = 0.0, y_m = 0.0, z_m = 0.0 }
radio_profile = "default_wifi"

[[nodes.radios]]
id = "wifi0"
channel = 36

[[nodes]]
id = "nodeB"
capabilities = ["relay"]
position = { x_m = 25.0, y_m = 0.0, z_m = 0.0 }
radio_profile = "default_wifi"

[[nodes.radios]]
id = "wifi0"
channel = 36

[[nodes]]
id = "nodeC"
position = { x_m = 50.0, y_m = 0.0, z_m = 0.0 }
radio_profile = "default_wifi"

[[nodes.radios]]
id = "wifi0"
channel = 36

[[links]]
id = "ab-wifi"
medium = "wifi"
endpoints = ["nodeA:wifi0", "nodeB:wifi0"]
latency_ms = 10
bandwidth_kbps = 100000
loss_percent = 0.0
enabled = true

[[links]]
id = "bc-wifi"
medium = "wifi"
endpoints = ["nodeB:wifi0", "nodeC:wifi0"]
latency_ms = 10
bandwidth_kbps = 100000
loss_percent = 0.0
enabled = true

[[assertions]]
at_secs = 20.0
condition = { type = "NodesConnected", nodes = ["nodeA", "nodeC"] }

[[assertions]]
at_secs = 30.0
condition = { type = "Ping", from = "nodeA", to = "nodeC", timeout_ms = 2500 }
